name: Gitopsy Self-Analysis

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Gitopsy
        uses: ./
        with:
          path: '.'
          output: 'gitopsy-report.html'
          upload-artifact: 'true'
